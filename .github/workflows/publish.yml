name: Publish

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing GitHub release tag to attach VSIX assets to
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      GH_TOKEN: ${{ github.token }}
      DISPATCH_TAG: ${{ inputs.tag_name }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Prepare release assets
        run: |
          VSIX_FILE="$(ls *.vsix)"
          cp "$VSIX_FILE" remote-html-to-chrome-latest.vsix
          printf 'VSIX_FILE=%s\n' "$VSIX_FILE" >> "$GITHUB_ENV"

      - name: Resolve target release tag
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            printf 'TARGET_TAG=%s\n' "$DISPATCH_TAG" >> "$GITHUB_ENV"
          else
            printf 'TARGET_TAG=%s\n' "$RELEASE_TAG" >> "$GITHUB_ENV"
          fi

      - name: Upload VSIX files to GitHub Release
        run: |
          gh release upload "$TARGET_TAG" "$VSIX_FILE" remote-html-to-chrome-latest.vsix --clobber

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: "*.vsix"

      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
