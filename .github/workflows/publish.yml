name: Publish

on:
  workflow_dispatch:
    inputs:
      publish_to_marketplace:
        description: Publish to the VS Code Marketplace using VSCE_PAT
        required: true
        type: boolean
        default: false
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: "*.vsix"

      - name: Publish to Marketplace
        if: ${{ (github.event_name == 'release' || inputs.publish_to_marketplace) && secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
