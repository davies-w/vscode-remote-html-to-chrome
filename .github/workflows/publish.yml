name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Prepare release assets
        run: |
          VSIX_FILE="$(ls *.vsix)"
          cp "$VSIX_FILE" remote-html-to-chrome-latest.vsix
          printf 'VSIX_FILE=%s\n' "$VSIX_FILE" >> "$GITHUB_ENV"

      - name: Upload VSIX files to GitHub Release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$VSIX_FILE" remote-html-to-chrome-latest.vsix --clobber

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: "*.vsix"

      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
